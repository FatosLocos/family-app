name: family-app

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?set-in-django_app/.env}
      APP_DB_NAME: ${APP_DB_NAME:-family_app}
      APP_DB_USER: ${APP_DB_USER:-family_app}
      APP_DB_PASSWORD: ${POSTGRES_PASSWORD:?set-in-django_app/.env}
    volumes:
      - family_app-postgres:/var/lib/postgresql/data
      - ./django_app/ops/init-postgres.sh:/docker-entrypoint-initdb.d/10-family-app-role.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-family_app} -d ${APP_DB_NAME:-family_app}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - family_app-redis:/data
    networks:
      default:
        aliases:
          - family-app-redis

  web:
    image: family-app:local
    build: ./django_app
    restart: unless-stopped
    env_file: ./django_app/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${APP_DB_USER:-family_app}:${POSTGRES_PASSWORD}@postgres:5432/${APP_DB_NAME:-family_app}}
      CELERY_BROKER_URL: redis://family-app-redis:6379/0
      CELERY_RESULT_BACKEND: redis://family-app-redis:6379/1
      CHANNEL_REDIS_URL: redis://family-app-redis:6379/2
      LOCAL_PROBE_SOURCE_DIR: /opt/family-app/local_probe
    command: >-
      sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput &&
      daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - family_app-media:/app/media
      - ./local_probe:/opt/family-app/local_probe:ro
    networks:
      default:
      edge:
        aliases:
          - family-app-web

  ha-listener:
    image: family-app:local
    restart: unless-stopped
    env_file: ./django_app/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${APP_DB_USER:-family_app}:${POSTGRES_PASSWORD}@postgres:5432/${APP_DB_NAME:-family_app}}
      CELERY_BROKER_URL: redis://family-app-redis:6379/0
      CELERY_RESULT_BACKEND: redis://family-app-redis:6379/1
      CHANNEL_REDIS_URL: redis://family-app-redis:6379/2
    command: python manage.py listen_home_assistant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-worker:
    image: family-app:local
    restart: unless-stopped
    env_file: ./django_app/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${APP_DB_USER:-family_app}:${POSTGRES_PASSWORD}@postgres:5432/${APP_DB_NAME:-family_app}}
      CELERY_BROKER_URL: redis://family-app-redis:6379/0
      CELERY_RESULT_BACKEND: redis://family-app-redis:6379/1
    command: celery -A config worker --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    image: family-app:local
    restart: unless-stopped
    env_file: ./django_app/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${APP_DB_USER:-family_app}:${POSTGRES_PASSWORD}@postgres:5432/${APP_DB_NAME:-family_app}}
      CELERY_BROKER_URL: redis://family-app-redis:6379/0
      CELERY_RESULT_BACKEND: redis://family-app-redis:6379/1
    command: celery -A config beat --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./django_app/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web

volumes:
  family_app-postgres:
    name: ${FAMILY_APP_POSTGRES_VOLUME:-family-app-postgres}
  family_app-redis:
    name: ${FAMILY_APP_REDIS_VOLUME:-family-app-redis}
  family_app-media:
    name: ${FAMILY_APP_MEDIA_VOLUME:-family-app-media}

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-family-app-edge}
