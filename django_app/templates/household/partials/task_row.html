<li id="task-{{ task.id }}" class="task-row {% if task.completed_at %}is-complete{% endif %}" data-task-id="{{ task.id }}"><button type="button" class="drag-handle" data-drag-handle aria-label="{{ task.title }} verslepen" title="Verslepen"><i data-lucide="grip-vertical"></i></button><form method="post" action="{% url 'household:toggle_task' task.id %}" hx-post="{% url 'household:toggle_task' task.id %}" hx-target="#task-{{ task.id }}" hx-swap="outerHTML">{% csrf_token %}<button class="check-button" aria-label="{{ task.title }} afvinken"><i data-lucide="{% if task.completed_at %}circle-check{% else %}circle{% endif %}"></i></button></form><div><strong>{{ task.title }}</strong><small>{% if task.assigned_to %}{{ task.assigned_to }}{% endif %}{% if task.due_at %} · {{ task.due_at|date:'D j M H:i' }}{% endif %}</small></div><span class="priority-dot priority-{{ task.priority }}"></span><button class="icon-button row-action" type="button" data-open-dialog="task-edit-{{ task.id }}" title="Taak aanpassen" aria-label="{{ task.title }} aanpassen"><i data-lucide="pencil"></i></button></li>
