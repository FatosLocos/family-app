<li id="shopping-{{ item.id }}" class="task-row {% if item.completed_at %}is-complete{% endif %}"><form method="post" action="{% url 'household:toggle_shopping_item' item.id %}?shopping_filter={{ shopping_filter|default:'open' }}" hx-post="{% url 'household:toggle_shopping_item' item.id %}?shopping_filter={{ shopping_filter|default:'open' }}" hx-target="#shopping-{{ item.id }}" hx-swap="outerHTML">{% csrf_token %}<button class="check-button" aria-label="{{ item.name }} afvinken"><i data-lucide="{% if item.completed_at %}circle-check{% else %}circle{% endif %}"></i></button></form><div><strong>{{ item.name }}</strong><small>{{ item.quantity }}{% if item.category %} · {{ item.category }}{% endif %}</small></div>{% if item.recurring %}<i class="row-icon" data-lucide="repeat-2" title="Terugkerend"></i>{% endif %}<button class="icon-button row-action" type="button" data-open-dialog="shopping-edit-{{ item.id }}" title="Boodschap aanpassen" aria-label="{{ item.name }} aanpassen"><i data-lucide="pencil"></i></button></li>
