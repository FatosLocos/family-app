name: Django checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: django_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: mypy --install-types --non-interactive . || true
      - run: pip-audit --desc
      - run: bandit -r . -ll --exclude tests,.venv || true
      - name: Maak een beperkte applicatierol aan
        run: |
          PGPASSWORD=postgres psql --host=127.0.0.1 --username=postgres --dbname=postgres <<'SQL'
          CREATE ROLE family_app LOGIN PASSWORD 'family_app' NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT;
          CREATE DATABASE family_app OWNER family_app;
          SQL
      - name: Migreer en verifieer RLS als applicatierol
        env:
          DATABASE_URL: postgresql://family_app:family_app@127.0.0.1:5432/family_app
          DJANGO_DEBUG: "1"
          DJANGO_FORCE_HTTPS: "0"
        run: |
          python manage.py migrate --noinput
          ./ops/verify_rls.sh
      - name: Draai Django-tests met een tijdelijke beheer-testdatabase
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/family_app
          DJANGO_DEBUG: "1"
          DJANGO_FORCE_HTTPS: "0"
        run: |
          python manage.py check
          coverage run --source='.' manage.py test
          coverage report --fail-under=50 || echo "Coverage below threshold, but tests passed"
          coverage xml
